<!DOCTYPE html>
<html>
<head>
    <title>Test Socket.io - Mentorat Platform</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 5px; border-radius: 5px; }
        .my-message { background: #007bff; color: white; text-align: right; }
        .other-message { background: #e9ecef; }
        .info { color: #666; font-style: italic; }
        input, button { padding: 5px; margin: 5px; }
    </style>
</head>
<body>
    <h2>Test Chat Socket.io</h2>
    <div>
        <label>Token JWT:</label>
        <input type="text" id="token" style="width: 400px" placeholder="Collez votre token ici">
        <button onclick="connect()">Connecter</button>
    </div>
    <div>
        <label>Session ID:</label>
        <input type="text" id="sessionId" placeholder="ID de la session">
        <button onclick="getHistory()">Charger historique</button>
    </div>
    <div id="messages"></div>
    <div>
        <input type="text" id="message" style="width: 400px" placeholder="Votre message">
        <button onclick="sendMessage()">Envoyer</button>
    </div>
    
    <script>
        let socket = null;
        let currentSessionId = null;
        
        function connect() {
            const token = document.getElementById('token').value;
            if (!token) {
                alert('Token requis');
                return;
            }
            
            socket = io('http://localhost:5000', {
                auth: { token }
            });
            
            socket.on('connect', () => {
                addMessage('info', '✅ Connecté au serveur');
            });
            
            socket.on('new_message', (message) => {
                addMessage('other', `${message.expediteur_nom || message.expediteur_id}: ${message.contenu}`);
            });
            
            socket.on('message_sent', (data) => {
                if (data.success) {
                    addMessage('my', `Moi: ${data.message.contenu}`);
                }
            });
            
            socket.on('user_typing', (data) => {
                const typingDiv = document.getElementById('typing');
                if (typingDiv) typingDiv.remove();
                if (data.is_typing) {
                    const div = document.createElement('div');
                    div.id = 'typing';
                    div.className = 'info';
                    div.innerText = `${data.user_name} est en train d'écrire...`;
                    document.getElementById('messages').appendChild(div);
                    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                } else {
                    const div = document.getElementById('typing');
                    if (div) div.remove();
                }
            });
            
            socket.on('history', (data) => {
                if (data.success) {
                    addMessage('info', `📜 Historique (${data.messages.length} messages)`);
                    data.messages.forEach(msg => {
                        addMessage(msg.expediteur_id === 'votre_id' ? 'my' : 'other', 
                                  `${msg.prenom} ${msg.nom}: ${msg.contenu}`);
                    });
                }
            });
            
            socket.on('error', (error) => {
                addMessage('error', `❌ Erreur: ${error.message}`);
            });
            
            socket.on('disconnect', () => {
                addMessage('info', '🔴 Déconnecté du serveur');
            });
        }
        
        function sendMessage() {
            if (!socket) {
                alert('Connectez-vous d\'abord');
                return;
            }
            const sessionId = document.getElementById('sessionId').value;
            const message = document.getElementById('message').value;
            if (!sessionId || !message) {
                alert('Session ID et message requis');
                return;
            }
            
            socket.emit('send_message', {
                session_id: sessionId,
                contenu: message
            });
            document.getElementById('message').value = '';
        }
        
        function getHistory() {
            if (!socket) {
                alert('Connectez-vous d\'abord');
                return;
            }
            const sessionId = document.getElementById('sessionId').value;
            if (!sessionId) {
                alert('Session ID requis');
                return;
            }
            
            currentSessionId = sessionId;
            document.getElementById('messages').innerHTML = '';
            socket.emit('get_history', { session_id: sessionId, page: 1, limit: 50 });
        }
        
        function addMessage(type, text) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${type === 'my' ? 'my-message' : (type === 'other' ? 'other-message' : 'info')}`;
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Typing indicator
        let typingTimeout;
        document.getElementById('message').addEventListener('input', () => {
            if (!socket || !currentSessionId) return;
            
            socket.emit('typing', { session_id: currentSessionId, is_typing: true });
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', { session_id: currentSessionId, is_typing: false });
            }, 1000);
        });
    </script>
</body>
</html>
